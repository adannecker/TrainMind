name: trainmind

services:
  postgres:
    build:
      context: .
      dockerfile: postgres/Dockerfile
    image: trainmind-postgres:16
    container_name: trainmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trainmind}
      POSTGRES_USER: ${POSTGRES_USER:-trainmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trainmind}
    volumes:
      - trainmind_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trainmind} -d ${POSTGRES_DB:-trainmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-migrate:
    build:
      context: ../..
      dockerfile: infra/docker/python-service.Dockerfile
    container_name: trainmind-db-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-trainmind}:${POSTGRES_PASSWORD:-trainmind}@postgres:5432/${POSTGRES_DB:-trainmind}
    command: ["alembic", "-c", "packages/db/alembic.ini", "upgrade", "head"]
    restart: "no"

  garmin-api:
    build:
      context: ../..
      dockerfile: infra/docker/python-service.Dockerfile
    container_name: trainmind-garmin-api
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-trainmind}:${POSTGRES_PASSWORD:-trainmind}@postgres:5432/${POSTGRES_DB:-trainmind}
    volumes:
      - trainmind_garmin_tokens:/app/data/garmin_tokens
    expose:
      - "8010"
    command: ["uvicorn", "apps.api.main:app", "--host", "0.0.0.0", "--port", "8010"]
    restart: unless-stopped

  hub-web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: trainmind-hub-web
    depends_on:
      garmin-api:
        condition: service_started
    expose:
      - "80"
    restart: unless-stopped

  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: trainmind-nginx-proxy
    depends_on:
      hub-web:
        condition: service_started
      garmin-api:
        condition: service_started
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-trainmind.de}
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - trainmind_letsencrypt:/etc/letsencrypt
      - trainmind_certbot_www:/var/www/certbot
      - ./nginx-proxy.conf.template:/etc/nginx/templates/default.conf.template:ro
    restart: unless-stopped

volumes:
  trainmind_pg_data:
    name: trainmind_pg_data
  trainmind_garmin_tokens:
    name: trainmind_garmin_tokens
  trainmind_letsencrypt:
    name: trainmind_letsencrypt
  trainmind_certbot_www:
    name: trainmind_certbot_www
